<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DOORS</title>
  <link rel="icon" type="image/svg+xml" href="images/2/logo.svg">
  <link rel="preload" href="./fonts/Tiny5-Regular.ttf" as="font" type="font/ttf" crossorigin>
  <style>
    @font-face {
      font-family: 'Tiny5';
      src: url('./fonts/Tiny5-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #fff; overflow: hidden; }
    body { font-family: 'Tiny5', sans-serif; color: #000; }
    
    .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; }
    .screen.active { display: flex; align-items: center; justify-content: center; }
    
    .logo { width: min(500px, 90vw); height: auto; }
    .game-image { width: min(100vw, 100vh); height: min(100vw, 100vh); max-width: 600px; max-height: 600px; }
    
    .menu-button { position: fixed; top: 20px; left: 20px; font-size: 50px; cursor: pointer; z-index: 100; }
    .scoreboard { position: fixed; top: 20px; right: 20px; font-size: 50px; text-align: right; z-index: 100; }
    .hs-number { display: inline-block; }
    .hs-number.gold { color: #FFD700; }
    .hs-number.pop { transform: scale(1.35); }
    .try-again { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 50px; cursor: pointer; z-index: 200; display: none; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 150; display: none; }
    
    .mode-option { font-size: 60px; cursor: pointer; margin: 20px 0; text-align: center; }
    .mode-option.coming-soon { color: #888; cursor: not-allowed; }
    .coming-soon-text { font-size: 20px; color: #aaa; text-align: center; }
    
    @media (max-width: 768px) {
      .menu-button, .scoreboard { font-size: 30px; }
      .try-again { font-size: 30px; }
      .mode-option { font-size: 40px; }
    }
  </style>
</head>
<body>
  <!-- Логотип экран -->
  <div class="screen active" id="logo-screen">
    <img src="./images/2/logo.svg" alt="DOORS" class="logo" id="logo">
  </div>

  <!-- Меню экран -->
  <div class="screen" id="menu-screen">
    <div>
      <div class="mode-option" onclick="startGame()">hs mode</div>
      <div class="mode-option coming-soon">
        bid mode
        <div class="coming-soon-text">coming soon</div>
      </div>
      <div class="mode-option coming-soon">
        pvp mode
        <div class="coming-soon-text">coming soon</div>
      </div>
    </div>
  </div>

  <!-- Игровой экран -->
  <div class="screen" id="game-screen">
    <img src="./images/2/2_static_image.svg" alt="Game" class="game-image" id="game-image">
  </div>

  <!-- UI элементы -->
  <div class="menu-button" id="menu-button" onclick="showMenu()">menu</div>
  <div class="scoreboard" id="scoreboard">
    <div>hs: <span class="hs-number" id="hs-number">0</span></div>
    <div id="current-score">0</div>
  </div>
  <div class="try-again" id="try-again" onclick="resetGame()">try again</div>
  <div class="overlay" id="overlay" onclick="resetGame()"></div>

  <script>
    // Состояние игры
    let currentScreen = 'logo';
    let score = 0;
    let highScore = 0;
    let isAnimating = false;
    let gameStarted = false;

    // DOM элементы
    const screens = {
      logo: document.getElementById('logo-screen'),
      menu: document.getElementById('menu-screen'),
      game: document.getElementById('game-screen')
    };
    const gameImage = document.getElementById('game-image');
    const scoreboard = document.getElementById('scoreboard');
    const currentScore = document.getElementById('current-score');
    const hsNumber = document.getElementById('hs-number');
    const tryAgain = document.getElementById('try-again');
    const overlay = document.getElementById('overlay');
    const menuButton = document.getElementById('menu-button');

    // Изображения игры
    const images = {
      static: './images/2/2_static_image.svg',
      left1: './images/2/2_left_1.svg',
      left2: './images/2/2_left_2.svg',
      left3: './images/2/2_left_3.svg',
      leftFail: './images/2/2_negative_left_4.svg',
      right1: './images/2/2_right_1.svg',
      right2: './images/2/2_right_2.svg',
      right3: './images/2/2_right_3.svg',
      rightFail: './images/2/2_negative_right_4.svg'
    };

    // Предзагрузка изображений
    Object.values(images).forEach(src => {
      const img = new Image();
      img.src = src;
    });

    // Функции экранов
    function showScreen(screenName) {
      Object.values(screens).forEach(screen => screen.classList.remove('active'));
      screens[screenName].classList.add('active');
      currentScreen = screenName;
    }

    // Загрузка рекорда
    function loadHighScore() {
      const saved = localStorage.getItem('doors_high_score');
      if (saved) {
        highScore = parseInt(saved);
        hsNumber.textContent = highScore;
      }
    }

    // Сохранение рекорда
    function saveHighScore() {
      localStorage.setItem('doors_high_score', highScore.toString());
    }

    // Обновление счета
    function updateScoreboard() {
      currentScore.textContent = score;
      if (score > highScore) {
        highScore = score;
        hsNumber.textContent = highScore;
        saveHighScore();
        celebrateHighScore();
      }
    }

    // Подсвечивание рекорда
    function celebrateHighScore() {
      hsNumber.classList.remove('gold', 'pop');
      void hsNumber.offsetWidth; // Принудительный reflow
      hsNumber.classList.add('gold', 'pop');
      setTimeout(() => {
        hsNumber.classList.remove('gold', 'pop');
      }, 220);
    }

    // Сброс игры
    function resetGame() {
      score = 0;
      isAnimating = false;
      gameStarted = true; // Исправлено: игра должна оставаться активной
      gameImage.src = images.static;
      tryAgain.style.display = 'none';
      overlay.style.display = 'none';
      menuButton.style.display = 'block'; // Кнопка menu видна на try again экране
      updateScoreboard();
    }

    // Показать меню
    function showMenu() {
      showScreen('menu');
      menuButton.style.display = 'none';
      scoreboard.style.display = 'none';
    }

    // Начать игру
    function startGame() {
      showScreen('game');
      menuButton.style.display = 'block';
      scoreboard.style.display = 'block';
      resetGame();
      gameStarted = true;
    }

    // Анимация последовательности
    function animateSequence(sequence, delays, callback) {
      if (isAnimating) return;
      isAnimating = true;
      
      let index = 0;
      
      function nextFrame() {
        if (index < sequence.length) {
          gameImage.src = images[sequence[index]];
          const delay = Array.isArray(delays) ? delays[index] : delays;
          setTimeout(nextFrame, delay);
          index++;
        } else {
          isAnimating = false;
          if (callback) callback();
        }
      }
      
      nextFrame();
    }

    // Обработка клика
    function handleClick(side) {
      if (!gameStarted || isAnimating) return;
      
      const isWin = Math.random() < 0.5;
      
      if (side === 'left') {
        if (isWin) {
          animateSequence(['left1', 'left2', 'left3'], 200, () => {
            score++;
            updateScoreboard();
            gameImage.src = images.static;
          });
        } else {
          animateSequence(['left1', 'left2', 'leftFail'], [200, 200, 400], () => {
            tryAgain.style.display = 'block';
            overlay.style.display = 'block';
          });
        }
      } else {
        if (isWin) {
          animateSequence(['right1', 'right2', 'right3'], 200, () => {
            score++;
            updateScoreboard();
            gameImage.src = images.static;
          });
        } else {
          animateSequence(['right1', 'right2', 'rightFail'], [200, 200, 400], () => {
            tryAgain.style.display = 'block';
            overlay.style.display = 'block';
          });
        }
      }
    }

    // Анимация логотипа
    function animateLogo() {
      const logo = document.getElementById('logo');
      const logoImages = [
        './images/2/logo.svg',
        './images/2/logo_1.svg',
        './images/2/logo.svg',
        './images/2/logo_2.svg'
      ];
      
      let index = 0;
      
      function nextLogo() {
        logo.src = logoImages[index];
        index = (index + 1) % logoImages.length;
        setTimeout(nextLogo, 200);
      }
      
      nextLogo();
    }

    // Инициализация
    function init() {
      loadHighScore();
      animateLogo();
      
      // Скрываем счет и кнопку menu на логотипе
      scoreboard.style.display = 'none';
      menuButton.style.display = 'none';
      
      // Клик по логотипу
      document.getElementById('logo-screen').onclick = () => {
        showScreen('menu');
      };
      
      // Клики по игровому экрану
      document.getElementById('game-screen').onclick = (e) => {
        const rect = gameImage.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const side = x < rect.width / 2 ? 'left' : 'right';
        handleClick(side);
      };
      
      // Предотвращение зума
      document.addEventListener('touchend', (e) => {
        if (e.touches.length > 1) {
          e.preventDefault();
        }
      });
    }

    // Запуск
    init();
  </script>
</body>
</html>
