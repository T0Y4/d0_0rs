<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DOORS</title>
  <link rel="icon" type="image/png" href="images/2/logo.png">
  <link rel="preload" href="./fonts/Tiny5-Regular.ttf" as="font" type="font/ttf" crossorigin>
  <style>
    @font-face {
      font-family: 'Tiny5';
      src: url('./fonts/Tiny5-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }
    html, body { 
      margin:0; 
      height:100%; 
      background:#fff; 
      overflow:hidden; 
      touch-action:manipulation; 
    }
    body { 
      display:flex; 
      justify-content:center; 
      align-items:center; 
      height:100vh; 
      font-family:'Tiny5', sans-serif; 
      color:#000; 
    }
    .center-screen { 
      position:fixed; 
      inset:0; 
      display:grid; 
      place-items:center; 
    }
    .logo { 
      width:min(500px, 90vw); 
      height:auto; 
      image-rendering:pixelated; 
      display:block; 
      cursor:default; 
    }
    .mode-menu { 
      position:fixed; 
      inset:0; 
      background:#fff; 
      display:none; 
      align-items:center; 
      justify-content:center; 
    }
    .mode-options { 
      display:flex; 
      flex-direction:column; 
      align-items:center; 
      gap:40px; 
    }
    .mode-option { 
      font-size:60px; 
      color:#000; 
      cursor:pointer; 
      display:flex; 
      flex-direction:column; 
      align-items:center; 
      gap:8px; 
    }
    .mode-option.coming-soon { 
      color:#888; 
      cursor:not-allowed; 
    }
    .coming-soon-text { 
      font-size:20px; 
      color:#aaa; 
      line-height:1; 
    }
    .menu-button { 
      position:fixed; 
      top:20px; 
      left:20px; 
      font-size:50px; 
      color:#000; 
      cursor:pointer; 
      z-index:200; 
    }
    .scoreboard-container { 
      position:fixed; 
      top:20px; 
      right:20px; 
      text-align:right; 
      z-index:100; 
    }
    .scoreboard, .high-score { 
      font-size:50px; 
    }
    .hs-number { 
      display:inline-block; 
      color:#000; 
      transform:scale(1); 
    }
    .hs-number.gold { 
      color:#FFD700; 
    }
    .hs-number.pop { 
      transform:scale(1.35); 
    }
    .try-again { 
      position:fixed; 
      top:50%; 
      left:50%; 
      transform:translate(-50%,-50%); 
      font-size:50px; 
      color:#000; 
      z-index:201; 
      opacity:0; 
      pointer-events:none; 
      cursor:pointer; 
    }
    .try-again.show { 
      opacity:1; 
      pointer-events:auto; 
    }
    .overlay { 
      position:fixed; 
      inset:0; 
      background:#fff; 
      z-index:199; 
      opacity:0; 
      pointer-events:none; 
    }
    .overlay.show { 
      opacity:1; 
      pointer-events:auto; 
    }
    #gameCanvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }
    @media (max-width:768px) {
      .scoreboard, .high-score { font-size:30px; }
      .menu-button { font-size:30px; }
      .try-again { font-size:30px; }
      .mode-option { font-size:40px; }
      .mode-options { gap:25px; }
    }
  </style>
</head>
<body>
  <div class="center-screen" id="logo-screen">
    <img src="./images/2/logo.png" alt="DOORS" class="logo" id="logo">
  </div>

  <div class="mode-menu" id="mode-menu">
    <div class="mode-options">
      <div class="mode-option available" id="mode-hs" onclick="selectMode('hs')">
        <span>hs mode</span>
      </div>
      <div class="mode-option coming-soon" id="mode-bid">
        <span>bid mode</span>
        <span class="coming-soon-text">coming soon</span>
      </div>
      <div class="mode-option coming-soon" id="mode-pvp">
        <span>pvp mode</span>
        <span class="coming-soon-text">coming soon</span>
      </div>
    </div>
  </div>

  <div class="menu-button" id="menu-button" onclick="returnToMenu()">menu</div>

  <div class="scoreboard-container">
    <div class="high-score" id="high-score"><span class="hs-label">hs:</span> <span class="hs-number">0</span></div>
    <div class="scoreboard" id="score">0</div>
  </div>

  <div class="try-again" id="try-again" onclick="resetPage()">try again</div>
  <div class="overlay" id="overlay" onclick="resetPage()"></div>

  <canvas id="gameCanvas"></canvas>

  <script>
    let score = 0, highScore = 0, isAnimating = false, gameStarted = false;
    let canvas, ctx, images = {}, currentImage = '2_static_image.png';
    let animationId = null, sceneToken = 0;

    const hsNumberEl = document.querySelector('.hs-number');
    const scoreEl = document.getElementById('score');

    function loadHighScore(){
      const s = localStorage.getItem('doors_high_score');
      if(s!==null){
        highScore = parseInt(s);
        hsNumberEl.textContent = highScore;
      }
    }
    function saveHighScore(){ localStorage.setItem('doors_high_score', highScore.toString()); }

    function celebrateHighScore(){
      hsNumberEl.classList.remove('gold','pop');
      void hsNumberEl.offsetWidth;
      hsNumberEl.classList.add('gold','pop');
      setTimeout(()=>{ hsNumberEl.classList.remove('gold','pop'); }, 220);
    }

    function updateScore(v){
      score = v;
      scoreEl.textContent = score;
      if(score > highScore){
        highScore = score;
        hsNumberEl.textContent = highScore;
        saveHighScore();
        celebrateHighScore();
      }
    }

    function setupCanvas() {
      canvas = document.getElementById('gameCanvas');
      ctx = canvas.getContext('2d');
      
      const resize = () => {
        const size = Math.min(window.innerWidth, window.innerHeight) * 0.8;
        canvas.width = size;
        canvas.height = size;
        canvas.style.width = size + 'px';
        canvas.style.height = size + 'px';
        render();
      };
      
      resize();
      window.addEventListener('resize', resize);
    }

    async function loadImages() {
      const imagePaths = [
        'images/2/2_static_image.png',
        'images/2/2_left_1.png',
        'images/2/2_left_2.png',
        'images/2/2_left_3.png',
        'images/2/2_negative_left_4_alt.png',
        'images/2/2_right_1.png',
        'images/2/2_right_2.png',
        'images/2/2_right_3.png',
        'images/2/2_negative_right_4_alt.png'
      ];
      
      const loadPromises = imagePaths.map(path => {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve({ path, img });
          img.onerror = () => reject(new Error(`Failed to load ${path}`));
          img.src = path;
        });
      });
      
      try {
        const loadedImages = await Promise.all(loadPromises);
        loadedImages.forEach(({ path, img }) => {
          images[path] = img;
        });
        initLogoScreen();
      } catch (error) {
        console.error('Image loading error:', error);
      }
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      const img = images[`images/2/${currentImage}`];
      if (img) {
        const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
        const x = (canvas.width - img.width * scale) / 2;
        const y = (canvas.height - img.height * scale) / 2;
        
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
      }
    }

    function showFrames(imageNames, intervals, cb){
      const myToken = ++sceneToken;
      let i=0; 
      let lastTime = 0;
      
      function animate(currentTime){
        if(myToken !== sceneToken) return;
        
        if(i < imageNames.length){
          const interval = Array.isArray(intervals) ? intervals[i] : intervals;
          
          if(currentTime - lastTime >= interval){
            currentImage = imageNames[i];
            render();
            lastTime = currentTime;
            
            if(i < imageNames.length - 1){
              i++;
            } else {
              setTimeout(() => {
                if(myToken !== sceneToken) return;
                cb();
              }, interval);
              return;
            }
          }
          
          if(myToken === sceneToken) {
            requestAnimationFrame(animate);
          }
        }
      }
      
      requestAnimationFrame(animate);
    }

    function handleClick(side){
      if(!gameStarted || isAnimating) return;
      isAnimating = true;
      const outcome = Math.floor(Math.random()*2);
      if(side==='left'){
        if(outcome===1){
          showFrames(['2_left_1.png','2_left_2.png','2_left_3.png'],350,()=>{ 
            currentImage = '2_static_image.png';
            render();
            updateScore(score+1); 
            isAnimating=false; 
          });
        }else{
          showFrames(['2_left_1.png','2_left_2.png','2_negative_left_4_alt.png'],[350,350,500],()=>{ 
            showTryAgainText(); 
            isAnimating=false; 
          });
        }
      }else{
        if(outcome===1){
          showFrames(['2_right_1.png','2_right_2.png','2_right_3.png'],350,()=>{ 
            currentImage = '2_static_image.png';
            render();
            updateScore(score+1); 
            isAnimating=false; 
          });
        }else{
          showFrames(['2_right_1.png','2_right_2.png','2_negative_right_4_alt.png'],[350,350,500],()=>{ 
            showTryAgainText(); 
            isAnimating=false; 
          });
        }
      }
    }

    function showTryAgainText(){
      if(!gameStarted) return;
      document.getElementById('try-again').classList.add('show');
      document.getElementById('overlay').classList.add('show');
    }

    function resetPage(){
      document.getElementById('try-again').classList.remove('show');
      document.getElementById('overlay').classList.remove('show');
      updateScore(0);
      currentImage = '2_static_image.png';
      render();
    }

    function initLogoScreen(){
      const logoScreen = document.getElementById('logo-screen');
      const modeMenu = document.getElementById('mode-menu');
      const gameContainer = document.getElementById('gameCanvas');
      const scoreboard = document.querySelector('.scoreboard-container');
      const menuButton = document.getElementById('menu-button');
      gameContainer.style.display='none';
      scoreboard.style.display='none';
      menuButton.style.display='none';
      modeMenu.style.display='none';
      logoScreen.style.display='grid';
    }

    function showModeMenu(){
      document.getElementById('logo-screen').style.display='none';
      document.getElementById('mode-menu').style.display='flex';
    }

    function selectMode(mode){ if(mode==='hs') startGame(); }

    function startGame(){
      const modeMenu = document.getElementById('mode-menu');
      const gameContainer = document.getElementById('gameCanvas');
      const scoreboard = document.querySelector('.scoreboard-container');
      const menuButton = document.getElementById('menu-button');
      gameStarted=false; isAnimating=false;
      updateScore(0); 
      currentImage = '2_static_image.png';
      render();
      document.getElementById('try-again').classList.remove('show');
      document.getElementById('overlay').classList.remove('show');
      modeMenu.style.display='none';
      gameContainer.style.display='block';
      scoreboard.style.display='block';
      menuButton.style.display='block';
      gameStarted=true;
    }

    function returnToMenu(){
      const gameContainer = document.getElementById('gameCanvas');
      const scoreboard = document.querySelector('.scoreboard-container');
      const menuButton = document.getElementById('menu-button');
      const modeMenu = document.getElementById('mode-menu');
      const tryAgain = document.getElementById('try-again');
      const overlay = document.getElementById('overlay');
      gameStarted=false; updateScore(0);
      gameContainer.style.display='none';
      scoreboard.style.display='none';
      menuButton.style.display='none';
      tryAgain.classList.remove('show');
      overlay.classList.remove('show');
      modeMenu.style.display='flex';
    }

    function setupEventListeners() {
      canvas.addEventListener('click', (e) => {
        if (!gameStarted || isAnimating) return;
        
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const side = x < canvas.width / 2 ? 'left' : 'right';
        handleClick(side);
      });
      
      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!gameStarted || isAnimating) return;
        
        const rect = canvas.getBoundingClientRect();
        const x = e.touches[0].clientX - rect.left;
        const side = x < canvas.width / 2 ? 'left' : 'right';
        handleClick(side);
      });

      document.getElementById('logo-screen').addEventListener('click', showModeMenu);
    }

    setupCanvas();
    loadImages();
    loadHighScore();
    setupEventListeners();
  </script>
</body>
</html>
