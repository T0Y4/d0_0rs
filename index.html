<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DOORS</title>
  <link rel="icon" type="image/svg+xml" href="images/2/logo.svg">
  <link rel="preload" href="./fonts/Tiny5-Regular.ttf" as="font" type="font/ttf" crossorigin>
  <style>
    @font-face {
      font-family: 'Tiny5';
      src: url('./fonts/Tiny5-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }
    html, body { margin:0; height:100%; background:#fff; overflow:hidden; touch-action:manipulation; }
    body { display:flex; justify-content:center; align-items:center; height:100vh; font-family:'Tiny5', sans-serif; color:#000; }
    .center-screen { position:fixed; inset:0; display:grid; place-items:center; }
    .logo { width:min(500px, 90vw); height:auto; image-rendering:pixelated; display:block; cursor:default; }
    .mode-menu { position:fixed; inset:0; background:#fff; display:none; align-items:center; justify-content:center; }
    .mode-options { display:flex; flex-direction:column; align-items:center; gap:40px; }
    .mode-option { font-size:60px; color:#000; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:8px; }
    .mode-option.coming-soon { color:#888; cursor:not-allowed; }
    .coming-soon-text { font-size:20px; color:#aaa; line-height:1; }
    .menu-button { position:fixed; top:20px; left:20px; font-size:50px; color:#000; cursor:pointer; z-index:200; }
    .scoreboard-container { position:fixed; top:20px; right:20px; text-align:right; z-index:100; }
    .scoreboard, .high-score { font-size:50px; }
    .hs-number { display:inline-block; color:#000; transform:scale(1); }
    .hs-number.gold { color:#FFD700; }
    .hs-number.pop { transform:scale(1.35); }
    .try-again { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-size:50px; color:#000; z-index:201; opacity:0; pointer-events:none; cursor:pointer; }
    .try-again.show { opacity:1; pointer-events:auto; }
    .overlay { position:fixed; inset:0; background:#fff; z-index:199; opacity:0; pointer-events:none; }
    .overlay.show { opacity:1; pointer-events:auto; }
    .image-container { position:relative; width:100vw; height:100vh; max-width:100%; max-height:100%; }
    .static-image { width:100%; height:100%; object-fit:contain; display:block; image-rendering:pixelated; image-rendering:-moz-crisp-edges; image-rendering:crisp-edges; }
    .side { position:absolute; top:0; width:50%; height:100%; }
    .left-side { left:0; } .right-side { right:0; }
    .frame { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:contain; display:none; image-rendering:pixelated; image-rendering:-moz-crisp-edges; image-rendering:crisp-edges; }
    @media (max-width:768px) {
      .scoreboard, .high-score { font-size:30px; }
      .menu-button { font-size:30px; }
      .try-again { font-size:30px; }
      .mode-option { font-size:40px; }
      .mode-options { gap:25px; }
    }
  </style>
</head>
<body>
  <div class="center-screen" id="logo-screen">
    <img src="./images/2/logo.svg" alt="DOORS" class="logo" id="logo">
  </div>

  <div class="mode-menu" id="mode-menu">
    <div class="mode-options">
      <div class="mode-option available" id="mode-hs" onclick="selectMode('hs')">
        <span>hs mode</span>
      </div>
      <div class="mode-option coming-soon" id="mode-bid">
        <span>bid mode</span>
        <span class="coming-soon-text">coming soon</span>
      </div>
      <div class="mode-option coming-soon" id="mode-pvp">
        <span>pvp mode</span>
        <span class="coming-soon-text">coming soon</span>
      </div>
    </div>
  </div>

  <div class="menu-button" id="menu-button" onclick="returnToMenu()">menu</div>

  <div class="scoreboard-container">
    <div class="high-score" id="high-score"><span class="hs-label">hs:</span> <span class="hs-number">0</span></div>
    <div class="scoreboard" id="score">0</div>
  </div>

  <div class="try-again" id="try-again" onclick="resetPage()">try again</div>
  <div class="overlay" id="overlay" onclick="resetPage()"></div>

  <div class="image-container" id="image-container">
    <img src="./images/2/2_static_image.svg" alt="Static Image" class="static-image" id="static">
    <div class="side left-side" onclick="handleClick('left')"></div>
    <div class="side right-side" onclick="handleClick('right')"></div>
    <img src="./images/2/2_left_1.svg" id="left-frame-1" class="frame">
    <img src="./images/2/2_left_2.svg" id="left-frame-2" class="frame">
    <img src="./images/2/2_left_3.svg" id="left-frame-3" class="frame">
    <img src="./images/2/2_negative_left_4.svg" id="negative-left-frame" class="frame">
    <img src="./images/2/2_right_1.svg" id="right-frame-1" class="frame">
    <img src="./images/2/2_right_2.svg" id="right-frame-2" class="frame">
    <img src="./images/2/2_right_3.svg" id="right-frame-3" class="frame">
    <img src="./images/2/2_negative_right_4.svg" id="negative-right-frame" class="frame">
  </div>

  <script>
    let score = 0, highScore = 0, isAnimating = false, gameStarted = false;
    let activeTimers = [], sceneToken = 0;

    const hsNumberEl = document.querySelector('.hs-number');
    const scoreEl = document.getElementById('score');

    function loadHighScore(){
      const s = localStorage.getItem('doors_high_score');
      if(s!==null){
        highScore = parseInt(s);
        hsNumberEl.textContent = highScore;
      }
    }
    function saveHighScore(){ localStorage.setItem('doors_high_score', highScore.toString()); }

    function celebrateHighScore(){
      hsNumberEl.classList.remove('gold','pop');
      void hsNumberEl.offsetWidth;
      hsNumberEl.classList.add('gold','pop');
      setTimeout(()=>{ hsNumberEl.classList.remove('gold','pop'); }, 220);
    }

    function updateScore(v){
      const prev = score;
      score = v;
      scoreEl.textContent = score;
      if(score > highScore){
        highScore = score;
        hsNumberEl.textContent = highScore;
        saveHighScore();
        celebrateHighScore();
      }
    }

    function setT(fn, ms){ 
      const id = setTimeout(fn, ms); 
      activeTimers.push(id); 
      return id; 
    }
    
    function cancelAnimations(){ 
      sceneToken++; 
      activeTimers.forEach(clearTimeout); 
      activeTimers = []; 
      document.querySelectorAll('.frame').forEach(f=>f.style.display='none'); 
      isAnimating=false; 
    }

    function handleClick(side){
      if(!gameStarted || isAnimating) return;
      const staticVisible = getComputedStyle(document.getElementById('static')).display !== 'none';
      if(!staticVisible) return;
      isAnimating = true;
      document.getElementById('static').style.display = 'none';
      scoreEl.style.display = 'block';
      const outcome = Math.floor(Math.random()*2);
      if(side==='left'){
        if(outcome===1){
          showFrames(['left-frame-1','left-frame-2','left-frame-3'],400,()=>{ resetToStatic(); updateScore(score+1); isAnimating=false; });
        }else{
          showFrames(['left-frame-1','left-frame-2','negative-left-frame'],[400,400,800],()=>{ showTryAgainText(); isAnimating=false; });
        }
      }else{
        if(outcome===1){
          showFrames(['right-frame-1','right-frame-2','right-frame-3'],400,()=>{ resetToStatic(); updateScore(score+1); isAnimating=false; });
        }else{
          showFrames(['right-frame-1','right-frame-2','negative-right-frame'],[400,400,800],()=>{ showTryAgainText(); isAnimating=false; });
        }
      }
    }

    function showFrames(ids, intervals, cb){
      const myToken = ++sceneToken;
      let i=0; 
      const frames = ids.map(id=>document.getElementById(id));
      const startTime = performance.now();
      
      function step(){
        if(myToken !== sceneToken) return;
        if(i < frames.length){
          const f = frames[i];
          f.style.display = 'block';
          if(i < frames.length - 1){
            const interval = Array.isArray(intervals) ? intervals[i] : intervals;
            setT(() => {
              if(myToken !== sceneToken) return;
              f.style.display = 'none';
              i++;
              step();
            }, interval);
          } else {
            const interval = Array.isArray(intervals) ? intervals[i] : intervals;
            setT(() => {
              if(myToken !== sceneToken) return;
              cb();
            }, interval);
          }
        }
      }
      step();
    }

    function resetToStatic(){
      document.querySelectorAll('.frame').forEach(f=>f.style.display='none');
      document.getElementById('static').style.display='block';
      scoreEl.style.display='block';
      document.getElementById('high-score').style.display='block';
    }

    function showTryAgainText(){
      if(!gameStarted) return;
      document.getElementById('try-again').classList.add('show');
      document.getElementById('overlay').classList.add('show');
    }

    function resetPage(){
      document.getElementById('try-again').classList.remove('show');
      document.getElementById('overlay').classList.remove('show');
      updateScore(0);
      resetToStatic();
    }

    function initLogoScreen(){
      const logoScreen = document.getElementById('logo-screen');
      const modeMenu = document.getElementById('mode-menu');
      const gameContainer = document.getElementById('image-container');
      const scoreboard = document.querySelector('.scoreboard-container');
      const menuButton = document.getElementById('menu-button');
      gameContainer.style.display='none';
      scoreboard.style.display='none';
      menuButton.style.display='none';
      modeMenu.style.display='none';
      logoScreen.style.display='grid';
    }

    function showModeMenu(){
      const logoScreen = document.getElementById('logo-screen');
      logoScreen.style.display='none';
      logoScreen.removeEventListener('click', showModeMenu);
      document.getElementById('mode-menu').style.display='flex';
    }

    function selectMode(mode){ if(mode==='hs') startGame(); }

    function startGame(){
      const modeMenu = document.getElementById('mode-menu');
      const gameContainer = document.getElementById('image-container');
      const scoreboard = document.querySelector('.scoreboard-container');
      const menuButton = document.getElementById('menu-button');
      
      const gameImages = [
        './images/2/2_static_image.svg',
        './images/2/2_left_1.svg',
        './images/2/2_left_2.svg',
        './images/2/2_left_3.svg',
        './images/2/2_negative_left_4.svg',
        './images/2/2_right_1.svg',
        './images/2/2_right_2.svg',
        './images/2/2_right_3.svg',
        './images/2/2_negative_right_4.svg'
      ];
      
      preloadImagesWithProgress(gameImages, ()=>{}, ()=>{
        cancelAnimations();
        gameStarted=false; isAnimating=false;
        updateScore(0); resetToStatic();
        document.getElementById('try-again').classList.remove('show');
        document.getElementById('overlay').classList.remove('show');
        modeMenu.style.display='none';
        gameContainer.style.display='block';
        scoreboard.style.display='block';
        menuButton.style.display='block';
        gameStarted=true;
      });
    }

    function returnToMenu(){
      const gameContainer = document.getElementById('image-container');
      const scoreboard = document.querySelector('.scoreboard-container');
      const menuButton = document.getElementById('menu-button');
      const modeMenu = document.getElementById('mode-menu');
      const tryAgain = document.getElementById('try-again');
      const overlay = document.getElementById('overlay');
      cancelAnimations();
      gameStarted=false; updateScore(0);
      gameContainer.style.display='none';
      scoreboard.style.display='none';
      menuButton.style.display='none';
      tryAgain.classList.remove('show');
      overlay.classList.remove('show');
      modeMenu.style.display='flex';
    }

    function preloadImagesWithProgress(srcs, onProgress, onDone){
      let loaded=0; const total=srcs.length;
      if(total===0){ onProgress(100); onDone(); return; }
      srcs.forEach(src=>{
        const img=new Image();
        img.onload=()=>{ 
          loaded++; 
          onProgress(Math.round(loaded/total*100)); 
          if(loaded>=total) onDone(); 
        };
        img.onerror=()=>{ 
          console.error('Image loading error:', src);
          loaded++; 
          onProgress(Math.round(loaded/total*100)); 
          if(loaded>=total) onDone(); 
        };
        img.src=src;
      });
    }

    function initPreloadAndActivateLogo(){
      const logoScreen = document.getElementById('logo-screen');
      const logoImg = document.getElementById('logo');
      const imagesToPreload = [
        './images/2/2_static_image.svg',
        './images/2/2_left_1.svg',
        './images/2/2_left_2.svg',
        './images/2/2_left_3.svg',
        './images/2/2_negative_left_4.svg',
        './images/2/2_right_1.svg',
        './images/2/2_right_2.svg',
        './images/2/2_right_3.svg',
        './images/2/2_negative_right_4.svg',
        './images/2/logo.svg',
        './images/2/logo_1.svg',
        './images/2/logo_2.svg'
      ];
      preloadImagesWithProgress(imagesToPreload, ()=>{}, ()=>{
        startLogoAnimation();
        logoScreen.style.cursor = 'pointer';
        // Обработчик клика по всему экрану логотипа
        logoScreen.addEventListener('click', showModeMenu);
        logoScreen.setAttribute('tabindex','0');
        logoScreen.onkeydown = (e)=>{ if(e.key==='Enter' || e.key===' ') { showModeMenu(); } };
      });
    }

    function startLogoAnimation(){
      const logoImg = document.getElementById('logo');
      const logoSequence = [
        './images/2/logo.svg',
        './images/2/logo_1.svg', 
        './images/2/logo.svg',
        './images/2/logo_2.svg'
      ];
      let currentIndex = 0;
      
      function animateLogo(){
        logoImg.src = logoSequence[currentIndex];
        currentIndex = (currentIndex + 1) % logoSequence.length;
        setTimeout(animateLogo, 400);
      }
      
      animateLogo();
    }

    function forcePreloadImages() {
      const allImages = [
        './images/2/2_static_image.svg',
        './images/2/2_left_1.svg',
        './images/2/2_left_2.svg',
        './images/2/2_left_3.svg',
        './images/2/2_negative_left_4.svg',
        './images/2/2_right_1.svg',
        './images/2/2_right_2.svg',
        './images/2/2_right_3.svg',
        './images/2/2_negative_right_4.svg',
        './images/2/logo.svg',
        './images/2/logo_1.svg',
        './images/2/logo_2.svg'
      ];
      
      allImages.forEach(src => {
        const img = new Image();
        img.src = src;
        document.body.appendChild(img);
        document.body.removeChild(img);
      });
    }
    
    initPreloadAndActivateLogo();
    loadHighScore();
    initLogoScreen();
    forcePreloadImages();
  </script>
</body>
</html>
