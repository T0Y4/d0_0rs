<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простая смена изображений</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fff;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        .image-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .image-slide {
            position: absolute;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: none;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }
        
        .image-slide.active {
            opacity: 1;
        }
        
        .debug-info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="debug-info" id="debugInfo">Загрузка...</div>
    
    <div class="image-container">
        <img src="images/2/2_static_image.png" alt="Статичное изображение" class="image-slide active" id="image0">
        <img src="images/2/2_left_1.png" alt="Левое изображение 1" class="image-slide" id="image1">
        <img src="images/2/2_left_2.png" alt="Левое изображение 2" class="image-slide" id="image2">
        <img src="images/2/2_left_3.png" alt="Левое изображение 3" class="image-slide" id="image3">
    </div>

    <script>
        const images = [
            'images/2/2_static_image.png',
            'images/2/2_left_1.png', 
            'images/2/2_left_2.png',
            'images/2/2_left_3.png'
        ];
        
        let currentImageIndex = 0;
        const displayDuration = 250; // 250мс
        let isPlaying = false;
        let animationId = null;
        let playCount = 0;
        let loadedImages = 0;
        
        function updateDebugInfo(message) {
            document.getElementById('debugInfo').textContent = message;
        }
        
        function showImage(index) {
            // Скрыть все изображения
            document.querySelectorAll('.image-slide').forEach(img => {
                img.classList.remove('active');
            });
            
            // Показать текущее изображение
            const currentImg = document.getElementById(`image${index}`);
            currentImg.classList.add('active');
            
            currentImageIndex = index;
            updateDebugInfo(`Показываем изображение ${index + 1}/4`);
        }
        
        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % images.length;
            showImage(currentImageIndex);
            
            // Если прошли полный цикл (4 картинки), останавливаем
            if (currentImageIndex === 0) {
                playCount++;
                if (playCount >= 1) {
                    stopSlideshow();
                    playCount = 0;
                }
            }
        }
        
        function startSlideshow() {
            if (!isPlaying) {
                isPlaying = true;
                playCount = 0;
                currentImageIndex = 0;
                showImage(currentImageIndex);
                updateDebugInfo('Анимация запущена');
                
                // Используем requestAnimationFrame для плавной анимации
                let lastTime = 0;
                function animate(currentTime) {
                    if (currentTime - lastTime >= displayDuration) {
                        nextImage();
                        lastTime = currentTime;
                    }
                    
                    if (isPlaying) {
                        animationId = requestAnimationFrame(animate);
                    }
                }
                
                animationId = requestAnimationFrame(animate);
            }
        }
        
        function stopSlideshow() {
            if (isPlaying) {
                isPlaying = false;
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                updateDebugInfo('Анимация остановлена');
            }
        }
        
        // Предзагрузка изображений
        function preloadImages() {
            updateDebugInfo('Загрузка изображений...');
            
            images.forEach((src, index) => {
                const img = new Image();
                img.onload = function() {
                    loadedImages++;
                    updateDebugInfo(`Загружено: ${loadedImages}/${images.length}`);
                    
                    if (loadedImages === images.length) {
                        updateDebugInfo('Все изображения загружены!');
                        setTimeout(() => {
                            document.getElementById('debugInfo').style.display = 'none';
                        }, 2000);
                    }
                };
                img.onerror = function() {
                    updateDebugInfo(`Ошибка загрузки: ${src}`);
                };
                img.src = src;
            });
        }
        
        // Обработчик нажатий по экрану
        document.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (!isPlaying) {
                startSlideshow();
            }
        });
        
        // Обработчик кликов мышью (для тестирования на компьютере)
        document.addEventListener('click', function(e) {
            e.preventDefault();
            if (!isPlaying) {
                startSlideshow();
            }
        });
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            preloadImages();
            showImage(0);
        });
    </script>
</body>
</html>
