<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DOORS</title>
  <link rel="icon" type="image/svg+xml" href="images/2/logo.svg">
  <link rel="preload" href="./fonts/Tiny5-Regular.ttf" as="font" type="font/ttf" crossorigin>
  <style>
    @font-face {
      font-family: 'Tiny5';
      src: url('./fonts/Tiny5-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }
    html, body { margin:0; height:100%; background:#fff; overflow:hidden; touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
    body { display:flex; justify-content:center; align-items:center; height:100vh; font-family:'Tiny5', sans-serif; color:#000; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; transform:translateZ(0); -webkit-backface-visibility:hidden; backface-visibility:hidden; }
    .center-screen { position:fixed; inset:0; display:grid; place-items:center; }
    .logo { width:min(500px, 90vw); height:auto; image-rendering:pixelated; display:block; cursor:default; }
    .mode-menu { position:fixed; inset:0; background:#fff; display:none; align-items:center; justify-content:center; }
    .mode-options { display:flex; flex-direction:column; align-items:center; gap:40px; }
    .mode-option { font-size:60px; color:#000; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:8px; }
    .mode-option.coming-soon { color:#888; cursor:not-allowed; }
    .coming-soon-text { font-size:20px; color:#aaa; line-height:1; }
    .menu-button { position:fixed; top:20px; left:20px; font-size:50px; color:#000; cursor:pointer; z-index:200; }
    .scoreboard-container { position:fixed; top:20px; right:20px; text-align:right; z-index:100; }
    .scoreboard, .high-score { font-size:50px; }
    .hs-number { display:inline-block; color:#000; transform:scale(1); }
    .hs-number.gold { color:#FFD700; }
    .hs-number.pop { transform:scale(1.35); }
    .try-again { position:fixed; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:50px; color:#000; z-index:201; opacity:0; pointer-events:none; cursor:pointer; }
    .try-again.show { opacity:1; pointer-events:auto; }
    .overlay { position:fixed; inset:0; background:#fff; z-index:199; opacity:0; pointer-events:none; }
    .overlay.show { opacity:1; pointer-events:auto; }
    .image-container { position:relative; width:min(100vw, 100vh); height:min(100vw, 100vh); max-width:600px; max-height:600px; margin:0 auto; transform:translateZ(0); -webkit-backface-visibility:hidden; backface-visibility:hidden; }
    .game-image { width:100%; height:100%; display:block; image-rendering:pixelated; transform:translateZ(0); -webkit-backface-visibility:hidden; backface-visibility:hidden; }
    .side { position:absolute; top:0; width:50%; height:100%; cursor:pointer; }
    .left-side { left:0; } .right-side { right:0; }
    @media (max-width:768px) {
      .scoreboard, .high-score { font-size:30px; }
      .menu-button { font-size:30px; }
      .try-again { font-size:30px; }
      .mode-option { font-size:40px; }
      .mode-options { gap:25px; }
      
      /* Мобильные оптимизации для устранения двоения */
      .image-container { max-width:90vw; max-height:90vw; }
      .game-image { 
        -webkit-transform:translateZ(0) scale(1); 
        transform:translateZ(0) scale(1);
        -webkit-perspective:1000px;
        perspective:1000px;
      }
    }
  </style>
</head>
<body>
  <div class="center-screen" id="logo-screen">
    <img src="./images/2/logo.svg" alt="DOORS" class="logo" id="logo">
  </div>

  <div class="mode-menu" id="mode-menu">
    <div class="mode-options">
      <div class="mode-option available" id="mode-hs" onclick="selectMode('hs')">
        <span>hs mode</span>
      </div>
      <div class="mode-option coming-soon" id="mode-bid">
        <span>bid mode</span>
        <span class="coming-soon-text">coming soon</span>
      </div>
      <div class="mode-option coming-soon" id="mode-pvp">
        <span>pvp mode</span>
        <span class="coming-soon-text">coming soon</span>
      </div>
    </div>
  </div>

  <div class="menu-button" id="menu-button" onclick="returnToMenu()">menu</div>

  <div class="scoreboard-container">
    <div class="high-score" id="high-score"><span class="hs-label">hs:</span> <span class="hs-number">0</span></div>
    <div class="scoreboard" id="score">0</div>
  </div>

  <div class="try-again" id="try-again" onclick="resetPage()">try again</div>
  <div class="overlay" id="overlay" onclick="resetPage()"></div>

  <div class="image-container" id="image-container">
    <img src="./images/2/2_static_image.svg" alt="Game Image" class="game-image" id="game-image">
    <div class="side left-side" onclick="handleClick('left')" ontouchstart="handleClick('left')"></div>
    <div class="side right-side" onclick="handleClick('right')" ontouchstart="handleClick('right')"></div>
  </div>

  <script>
    let score = 0, highScore = 0, isAnimating = false, gameStarted = false;
    let activeTimers = [], sceneToken = 0;

    // Кэшируем DOM элементы для производительности
    const hsNumberEl = document.querySelector('.hs-number');
    const scoreEl = document.getElementById('score');
    const gameImageEl = document.getElementById('game-image');
    const tryAgainEl = document.getElementById('try-again');
    const overlayEl = document.getElementById('overlay');
    const highScoreEl = document.getElementById('high-score');
    
    // Предзагружаем все игровые изображения
    const gameImages = {
      static: './images/2/2_static_image.svg',
      left1: './images/2/2_left_1.svg',
      left2: './images/2/2_left_2.svg',
      left3: './images/2/2_left_3.svg',
      leftNegative: './images/2/2_negative_left_4.svg',
      right1: './images/2/2_right_1.svg',
      right2: './images/2/2_right_2.svg',
      right3: './images/2/2_right_3.svg',
      rightNegative: './images/2/2_negative_right_4.svg'
    };
    
    // Предзагружаем изображения
    Object.values(gameImages).forEach(src => {
      const img = new Image();
      img.src = src;
    });

    function loadHighScore(){
      const s = localStorage.getItem('doors_high_score');
      if(s!==null){
        highScore = parseInt(s);
        hsNumberEl.textContent = highScore;
      }
    }
    function saveHighScore(){ localStorage.setItem('doors_high_score', highScore.toString()); }

    function celebrateHighScore(){
      hsNumberEl.classList.remove('gold','pop');
      void hsNumberEl.offsetWidth;
      hsNumberEl.classList.add('gold','pop');
      setTimeout(()=>{ hsNumberEl.classList.remove('gold','pop'); }, 220);
    }

    function updateScore(v){
      const prev = score;
      score = v;
      scoreEl.textContent = score;
      if(score > highScore){
        highScore = score;
        hsNumberEl.textContent = highScore;
        saveHighScore();
        celebrateHighScore();
      }
    }

    function setT(fn, ms){ 
      const id = setTimeout(fn, ms); 
      activeTimers.push(id); 
      return id; 
    }
    
    function cancelAnimations(){ 
      sceneToken++; 
      for(let i = 0; i < activeTimers.length; i++) {
        clearTimeout(activeTimers[i]);
      }
      activeTimers = []; 
      isAnimating=false; 
    }

    function handleClick(side){
      if(!gameStarted || isAnimating) return;
      
      isAnimating = true;
      scoreEl.style.display = 'block';
      
      // Добавляем тактильную обратную связь для мобильных
      if('vibrate' in navigator) {
        navigator.vibrate(50);
      }
      
      const outcome = Math.floor(Math.random()*2);
      const isLeft = side === 'left';
      const isWin = outcome === 1;
      
      if(isLeft){
        if(isWin){
          showGameSequence(['left1','left2','left3'],200,()=>{ resetToStatic(); updateScore(score+1); isAnimating=false; });
        }else{
          showGameSequence(['left1','left2','leftNegative'],[200,200,400],()=>{ showTryAgainText(); isAnimating=false; });
        }
      }else{
        if(isWin){
          showGameSequence(['right1','right2','right3'],200,()=>{ resetToStatic(); updateScore(score+1); isAnimating=false; });
        }else{
          showGameSequence(['right1','right2','rightNegative'],[200,200,400],()=>{ showTryAgainText(); isAnimating=false; });
        }
      }
    }

    // Новая функция для игры - использует один элемент
    function showGameSequence(imageKeys, intervals, cb){
      const myToken = ++sceneToken;
      let i=0;
      
      function step(){
        if(myToken !== sceneToken) return;
        if(i < imageKeys.length){
          const imageKey = imageKeys[i];
          
          // Плавно скрываем изображение
          gameImageEl.style.opacity = '0';
          
          // Принудительный reflow
          gameImageEl.offsetHeight;
          
          // Меняем изображение
          gameImageEl.src = gameImages[imageKey];
          
          // Плавно показываем изображение
          gameImageEl.style.opacity = '1';
          
          if(i < imageKeys.length - 1){
            const interval = Array.isArray(intervals) ? intervals[i] : intervals;
            setT(() => {
              if(myToken !== sceneToken) return;
              i++;
              step();
            }, interval);
          } else {
            const interval = Array.isArray(intervals) ? intervals[i] : intervals;
            setT(() => {
              if(myToken !== sceneToken) return;
              cb();
            }, interval);
          }
        }
      }
      step();
    }

    // Оптимизированная функция анимации для логотипа
    function animateSequence(element, sequence, interval, loop = true, onComplete = null){
      let currentIndex = 0;
      let animationId;
      
      // Предзагружаем все изображения для устранения мерцания
      const preloadedImages = [];
      sequence.forEach(src => {
        const img = new Image();
        img.src = src;
        preloadedImages.push(img);
      });
      
      function step(){
        if(element && sequence && sequence.length > 0){
          // Принудительно скрываем элемент перед сменой src
          element.style.opacity = '0';
          
          // Используем предзагруженное изображение
          element.src = preloadedImages[currentIndex].src;
          
          // Принудительный reflow
          element.offsetHeight;
          
          // Показываем элемент
          element.style.opacity = '1';
          
          currentIndex++;
          
          if(currentIndex >= sequence.length){
            if(loop){
              currentIndex = 0;
            } else {
              if(onComplete) onComplete();
              return;
            }
          }
          
          animationId = setTimeout(step, interval);
        }
      }
      
      step();
      
      // Возвращаем функцию для остановки анимации
      return () => {
        if(animationId) clearTimeout(animationId);
      };
    }

    function resetToStatic(){
      // Возвращаем статичное изображение
      gameImageEl.src = gameImages.static;
      gameImageEl.style.opacity = '1';
      
      scoreEl.style.display='block';
      highScoreEl.style.display='block';
    }

    function showTryAgainText(){
      if(!gameStarted) return;
      tryAgainEl.classList.add('show');
      overlayEl.classList.add('show');
    }

    function resetPage(){
      tryAgainEl.classList.remove('show');
      overlayEl.classList.remove('show');
      updateScore(0);
      resetToStatic();
    }

    function initLogoScreen(){
      const logoScreen = document.getElementById('logo-screen');
      const modeMenu = document.getElementById('mode-menu');
      const gameContainer = document.getElementById('image-container');
      const scoreboard = document.querySelector('.scoreboard-container');
      const menuButton = document.getElementById('menu-button');
      
      gameContainer.style.display='none';
      scoreboard.style.display='none';
      menuButton.style.display='none';
      modeMenu.style.display='none';
      logoScreen.style.display='grid';
    }

    function showModeMenu(){
      const logoScreen = document.getElementById('logo-screen');
      const modeMenu = document.getElementById('mode-menu');
      
      // Останавливаем анимацию логотипа
      if(logoAnimationStop) logoAnimationStop();
      
      logoScreen.style.display='none';
      logoScreen.removeEventListener('click', showModeMenu);
      modeMenu.style.display='flex';
    }

    function selectMode(mode){ if(mode==='hs') startGame(); }

    function startGame(){
      const modeMenu = document.getElementById('mode-menu');
      const gameContainer = document.getElementById('image-container');
      const scoreboard = document.querySelector('.scoreboard-container');
      const menuButton = document.getElementById('menu-button');
      
      const gameImagesArray = Object.values(gameImages);
      
      preloadImagesWithProgress(gameImagesArray, ()=>{}, ()=>{
        cancelAnimations();
        gameStarted=false; isAnimating=false;
        updateScore(0); resetToStatic();
        tryAgainEl.classList.remove('show');
        overlayEl.classList.remove('show');
        modeMenu.style.display='none';
        gameContainer.style.display='block';
        scoreboard.style.display='block';
        menuButton.style.display='block';
        gameStarted=true;
      });
    }

    function returnToMenu(){
      const gameContainer = document.getElementById('image-container');
      const scoreboard = document.querySelector('.scoreboard-container');
      const menuButton = document.getElementById('menu-button');
      const modeMenu = document.getElementById('mode-menu');
      const tryAgain = document.getElementById('try-again');
      const overlay = document.getElementById('overlay');
      
      cancelAnimations();
      gameStarted=false; 
      updateScore(0);
      
      gameContainer.style.display='none';
      scoreboard.style.display='none';
      menuButton.style.display='none';
      tryAgainEl.classList.remove('show');
      overlayEl.classList.remove('show');
      modeMenu.style.display='flex';
      
      // Останавливаем анимацию логотипа если она была запущена
      if(logoAnimationStop) logoAnimationStop();
    }

    function preloadImagesWithProgress(srcs, onProgress, onDone){
      let loaded=0; const total=srcs.length;
      if(total===0){ onProgress(100); onDone(); return; }
      srcs.forEach(src=>{
        const img=new Image();
        img.onload=()=>{ 
          loaded++; 
          onProgress(Math.round(loaded/total*100)); 
          if(loaded>=total) onDone(); 
        };
        img.onerror=()=>{ 
          console.error('Image loading error:', src);
          loaded++; 
          onProgress(Math.round(loaded/total*100)); 
          if(loaded>=total) onDone(); 
        };
        img.src=src;
      });
    }

    function initPreloadAndActivateLogo(){
      const logoScreen = document.getElementById('logo-screen');
      const logoImg = document.getElementById('logo');
      const imagesToPreload = [
        ...Object.values(gameImages),
        './images/2/logo.svg',
        './images/2/logo_1.svg',
        './images/2/logo_2.svg'
      ];
      preloadImagesWithProgress(imagesToPreload, ()=>{}, ()=>{
        startLogoAnimation();
        logoScreen.style.cursor = 'pointer';
        // Обработчик клика по всему экрану логотипа
        logoScreen.addEventListener('click', showModeMenu);
        logoScreen.setAttribute('tabindex','0');
        logoScreen.onkeydown = (e)=>{ if(e.key==='Enter' || e.key===' ') { showModeMenu(); } };
      });
    }

    let logoAnimationStop = null;

    function startLogoAnimation(){
      const logoImg = document.getElementById('logo');
      const logoSequence = [
        './images/2/logo.svg',
        './images/2/logo_1.svg', 
        './images/2/logo.svg',
        './images/2/logo_2.svg'
      ];
      
      // Останавливаем предыдущую анимацию если есть
      if(logoAnimationStop) logoAnimationStop();
      
      // Запускаем новую анимацию
      logoAnimationStop = animateSequence(logoImg, logoSequence, 200, true);
    }

    function forcePreloadImages() {
      const allImages = [
        ...Object.values(gameImages),
        './images/2/logo.svg',
        './images/2/logo_1.svg',
        './images/2/logo_2.svg'
      ];
      
      allImages.forEach(src => {
        const img = new Image();
        img.src = src;
        document.body.appendChild(img);
        document.body.removeChild(img);
      });
    }
    
    // Предотвращение зума на двойное касание
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
    
    // Оптимизация производительности
    document.addEventListener('DOMContentLoaded', () => {
      // Принудительное включение аппаратного ускорения для всех элементов
      const allElements = document.querySelectorAll('*');
      for(let i = 0; i < allElements.length; i++) {
        allElements[i].style.transform = 'translateZ(0)';
        allElements[i].style.webkitBackfaceVisibility = 'hidden';
        allElements[i].style.backfaceVisibility = 'hidden';
      }
      
      // Специальные мобильные оптимизации
      if(/Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
        // Отключаем зум на мобильных
        document.addEventListener('gesturestart', function (e) {
          e.preventDefault();
        });
        
        // Оптимизируем рендеринг для мобильных
        const gameElements = document.querySelectorAll('.image-container, .game-image, .logo');
        gameElements.forEach(el => {
          el.style.webkitTransform = 'translateZ(0) scale(1)';
          el.style.transform = 'translateZ(0) scale(1)';
          el.style.webkitPerspective = '1000px';
          el.style.perspective = '1000px';
        });
      }
    });
    
    initPreloadAndActivateLogo();
    loadHighScore();
    initLogoScreen();
    forcePreloadImages();
  </script>
</body>
</html>
